name: Keep Render service alive + Telegram
# Дёргаем сервис на Render и уведомляем в Telegram

on:
  schedule:
    - cron: '*/10 * * * *'   # каждые 10 минут
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping info endpoint of vactrak-service
        env:
          URL: ${{ secrets.VACTRAK_URL }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Пинг $(date -u) → $URL"
          # Небольшая случайная задержка (jitter 0-90 сек)
          sleep $((RANDOM % 90))

          # Таймаут 90 сек (Render free cold start иногда > 50 сек)
          # || echo "000" — чтобы set -e не убил скрипт при timeout/connect error
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -L --max-time 90 --connect-timeout 20 \
            "$URL" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Успешно: статус $HTTP_CODE"
          else
            echo "❌ Ошибка: статус $HTTP_CODE"
            # Уведомление в Telegram (даже при timeout / 000)
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="<b>⚠️ Render Keep-Alive</b>%0A%0AПриложение не отвечает!%0AURL: ${URL}%0AСтатус: ${HTTP_CODE}%0AВремя: $(date -u)" \
              > /dev/null || true
            exit 1
          fi
