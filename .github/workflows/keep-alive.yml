name: Keep Render service alive + Telegram
# Дёргаем сервис на Render и уведомляем в Telegram

on:
  schedule:
    - cron: '*/10 * * * *'   # каждые 10 минут
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping info endpoint of vactrak-service
        env:
          URL: ${{ secrets.VACTRAK_URL }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Пинг $(date -u) → $URL"

          # Небольшая случайная задержка (jitter 0-90 сек)
          sleep $((RANDOM % 90))

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -f -L -m 30 "$URL")

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Успешно: статус $RESPONSE"
          else
            echo "❌ Ошибка: статус $RESPONSE"

            # Уведомление в Telegram
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d parse_mode="HTML" \
              -d text="<b>⚠️ Render Keep-Alive</b>%0A%0AПриложение не отвечает!%0AURL: $URL%0AСтатус: $RESPONSE%0AВремя: $(date -u)" > /dev/null

            exit 1
          fi
