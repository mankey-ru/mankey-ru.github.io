name: Translate index.html to Russian
on:
  push: # если надо запускать при пуше
    paths: # если надо запускать при пуше путей
      - 'index.html' # если надо запускать при пуше index.html
  workflow_dispatch: # если надо вручную запускать allows manual runs from the Actions UI for testing


# Opt into running JavaScript actions on Node.js 24 now (только сами экшоны, внутри может быть любая нода)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  translate:
    name: Translate index.html -> index_ru.html
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: "npm ci"

      - name: Run translation script (use OpenRouter if available)
        env:
          # OpenRouter
          # проверка доступности АПИ в ЦМД:
          # curl -X POST "https://openrouter.ai/api/v1/chat/completions" -H "Content-Type: application/json" -H "Authorization: Bearer %OPENROUTER_API_KEY%" -d "{\"model\":\"deepseek/deepseek-v4-flash\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello\"}]}"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # OPENROUTER_MODEL: deepseek/deepseek-v4-flash
          OPENROUTER_MODEL: deepseek/deepseek-v4-pro
          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: node scripts/translate.js index.html index_ru.html

      - name: Commit and push translated file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index_ru.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-translate index.html → index_ru.html (via model)"
          git push