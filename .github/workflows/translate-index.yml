name: index.html - Translate  to Russian, Generate PDF # , Deploy to Cloudflare Pages
on:
  push:
    paths:
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  translate:
    name: Translate index.html → index_ru.html + generate PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: "npm ci --prefer-offline"

      - name: Install Playwright browsers and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Generate PDF from ENG HTML
        run: "node scripts/generate-pdf.mjs index.html assets/pdf/pavel_prokhorenko_resume.pdf"   

      - name: Run translation script (use OpenRouter if available)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: deepseek/deepseek-v4-pro
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: node scripts/translate.js index.html index_ru.html

      - name: Generate PDF from RUS translated HTML
        run: "node scripts/generate-pdf.mjs index_ru.html assets/pdf/pavel_prokhorenko_resume_ru.pdf"

      - name: Commit and push translated file + PDF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index_ru.html assets/pdf/pavel_prokhorenko_resume.pdf assets/pdf/pavel_prokhorenko_resume_ru.pdf
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-translate index.html → index_ru.html + generate PDF (via model)"
          git push
      # - name: Deploy to Cloudflare Pages
      #   uses: cloudflare/wrangler-action@v3
      #   with:
      #     apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      #     command: "pages deploy . --project-name=mankey-ru"